{% extends 'base.html' %}

{% block title %}Вход | ULTRA Agency{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h1 class="h4 mb-3">Вход в систему</h1>

                {% if form.errors %}
                    <div class="alert alert-danger">
                        Неверный логин или пароль. Проверьте данные и попробуйте снова.
                    </div>
                {% endif %}

                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label" for="{{ form.username.id_for_label }}">Логин</label>
                        <input
                            type="text"
                            name="{{ form.username.html_name }}"
                            id="{{ form.username.id_for_label }}"
                            class="form-control"
                            required
                            autofocus
                        >
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="{{ form.password.id_for_label }}">Пароль</label>
                        <input
                            type="password"
                            name="{{ form.password.html_name }}"
                            id="{{ form.password.id_for_label }}"
                            class="form-control"
                            required
                        >
                    </div>
                    <button class="btn btn-dark w-100" type="submit">Войти</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
