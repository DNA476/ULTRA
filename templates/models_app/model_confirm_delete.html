{% extends 'base.html' %}

{% block title %}Удаление модели | ULTRA Agency{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h1 class="h4 mb-3">Удалить анкету модели?</h1>
                <p class="text-muted">Вы собираетесь удалить анкету <strong>{{ model_card }}</strong>. Это действие также удалит дополнительные фото, связанные с анкетой.</p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button class="btn btn-danger" type="submit">Удалить</button>
                        <a class="btn btn-outline-secondary" href="{% url 'models_app:model_detail' model_card.pk %}">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
